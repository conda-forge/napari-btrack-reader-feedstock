{% set name = "napari-btrack-reader" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari-btrack-reader-{{ version }}.tar.gz
  sha256: 484fcb17fcd58a0a1defe04813cc44decb255a7687f4e3cca3e861903758ac6b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools-scm
  run:
    - btrack >=0.4.0
    - napari-plugin-engine >=0.1.4
    - python >={{ python_min }}

test:
  imports:
    - napari_btrack_reader
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/quantumjot/napari-btrack-reader
  summary: A plugin to load btrack files
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
    - jaimergp
